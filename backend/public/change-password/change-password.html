<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>RISTOWORD – Cambio password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo">RW</div>
        <div>
          <h1>RISTOWORD</h1>
          <p class="subtitle">Cambio password obbligatorio</p>
        </div>
      </div>

      <p style="color:var(--muted);font-size:14px;margin-bottom:20px;">
        Per motivi di sicurezza, devi impostare una nuova password prima di continuare.
      </p>

      <div id="change-message" class="login-message"></div>

      <form id="change-form" class="login-form" autocomplete="off">
        <div class="field" id="field-current" style="display:none;">
          <label for="current-password">Password attuale</label>
          <input
            type="password"
            id="current-password"
            name="currentPassword"
            placeholder="Inserisci password attuale"
            autocomplete="current-password"
          />
        </div>
        <div class="field">
          <label for="new-password">Nuova password</label>
          <input
            type="password"
            id="new-password"
            name="newPassword"
            placeholder="Nuova password (min. 6 caratteri)"
            autocomplete="new-password"
            required
            minlength="6"
          />
        </div>
        <div class="field">
          <label for="confirm-password">Conferma password</label>
          <input
            type="password"
            id="confirm-password"
            name="confirmPassword"
            placeholder="Ripeti password"
            autocomplete="new-password"
            required
            minlength="6"
          />
        </div>
        <button type="submit" class="btn-login" id="btn-submit">
          Imposta password
        </button>
      </form>

      <div id="success-panel" style="display:none;text-align:center;margin-top:8px;">
        <p class="subtitle" style="margin-bottom:16px;color:var(--muted);font-size:14px;">
          Password aggiornata. Scegli dove andare:
        </p>
        <div style="display:flex;flex-direction:column;gap:10px;">
          <a href="/" class="btn-login" style="text-decoration:none;display:block;text-align:center;">Vai alla dashboard</a>
          <a href="/dev-access/dashboard" class="btn-login" style="text-decoration:none;display:block;text-align:center;opacity:0.92;background:rgba(255,255,255,.08);">
            Configurazione locale (personale, licenza)
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="change-password.js"></script>
</body>
</html>
