<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>RISTOWORD – Attivazione Owner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/login/login.css" />
<style>
.oa-back-link { margin-top:16px; text-align:center; }
.oa-back-link a { color:var(--accent); text-decoration:none; font-size:13px; }
.oa-back-link a:hover { text-decoration:underline; }
</style>
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo">RW</div>
        <div>
          <h1>RISTOWORD</h1>
          <p class="subtitle">Attivazione Owner</p>
        </div>
      </div>

      <div id="oa-message" class="login-message"></div>

      <div id="oa-step1">
        <form id="oa-form-verify" class="login-form">
          <div class="field">
            <label for="oa-license">Codice di attivazione</label>
            <input type="text" id="oa-license" placeholder="Codice licenza" required autocomplete="off" spellcheck="false" />
            <p class="subtitle" style="margin-top:8px;font-size:12px;opacity:0.85;line-height:1.4;">
              Verifica tramite Gestione Semplificata (POST JSON).
            </p>
          </div>
          <button type="submit" class="btn-login" id="oa-btn-verify">Verifica codice</button>
        </form>
      </div>

      <div id="oa-step2" style="display:none;">
        <form id="oa-form-password" class="login-form">
          <input type="hidden" id="oa-license-hidden" />
          <div class="field">
            <label for="oa-email">Email (per l'accesso)</label>
            <input type="email" id="oa-email" placeholder="tua@email.it" required autocomplete="email" />
          </div>
          <div class="field">
            <label for="oa-password">Nuova password</label>
            <input type="password" id="oa-password" placeholder="Min. 8 caratteri" required minlength="8" autocomplete="new-password" />
          </div>
          <div class="field">
            <label for="oa-confirm">Conferma password</label>
            <input type="password" id="oa-confirm" placeholder="Ripeti password" required minlength="8" autocomplete="new-password" />
          </div>
          <button type="submit" class="btn-login" id="oa-btn-create">Crea accesso owner</button>
        </form>
        <p class="oa-back-link">
          <a href="#" id="oa-back">← Cambia codice</a>
        </p>
      </div>

      <p class="oa-back-link" id="oa-link-login-wrap">
        <a href="/login/login.html">← Torna al login</a>
        ·
        <a href="/dashboard/dashboard.html">Dashboard</a>
      </p>
    </div>
  </div>

  <script src="/owner-activate/owner-activate.js"></script>
</body>
</html>
