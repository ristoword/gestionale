<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>RISTOWORD – Attivazione Owner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/login/login.css" />
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="brand-block">
        <div class="brand-logo">RW</div>
        <div>
          <h1>RISTOWORD</h1>
          <p class="subtitle">Attivazione Owner</p>
        </div>
      </div>

      <div id="oa-message" class="login-message"></div>

      <form id="oa-form" class="login-form">
        <div class="field">
          <label for="oa-license">Codice licenza</label>
          <input type="text" id="oa-license" placeholder="Es. XXX-YYYY" required />
        </div>
        <button type="submit" class="btn-login" id="oa-submit">
          Attiva Ristoword
        </button>
      </form>

      <div class="demo-box">
        <div class="demo-title">Owner activation</div>
        <div class="demo-row">Inserisci il codice licenza ricevuto.</div>
      </div>
    </div>
  </div>

  <script src="/owner-activate/owner-activate.js"></script>
</body>
</html>
